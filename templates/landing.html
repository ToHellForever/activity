{% extends 'base.html' %}
{% load static %}
{% block title %}БИЗНЕС АФИША{% endblock %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/pages/landing.css' %}">
<script src="{% static 'js/pages/landing.js' %}" defer></script>
<div class='row mt-5'>
    <div class='col-7'>
        <div class='filters-landing'>
            <h1 class='landing-title'>ПЛАТФОРМА ДЕЛОВОЙ ЖИЗНИ ГОРОДА</h1>
            <p class='landing-text'>где собраны проверенные события, обучение, организаторы и площадки в одном месте.</p>
<div class='row filers-row'>
                <div class='col-3 filers-col'>
                    <div class="filter-item">
                        <div class="filter-label">КАТЕГОРИЯ</div>
                        <input type="text" class="form-control filter-input" placeholder="">
                    </div>
                </div>
                <div class='col-2 filers-col'>
                    <div class="filter-item">
                        <div class="filter-label">ДАТА</div>
                        <input type="text" class="form-control filter-input" placeholder="">
                    </div>
                </div>
                <div class='col-4 filers-col'>
                    <div class="filter-item">
                        <div class="filter-label">НАЗВАНИЕ</div>
                        <input type="text" class="form-control filter-input" placeholder="">
                    </div>
                </div>
                <div class='col-3 filers-col'>
                    <div class="filter-button-container">
                        <button class="btn btn-primary filter-button">Применить</button>
                    </div>
                </div>
            </div>
        </div>
</div>
{% endblock %}
