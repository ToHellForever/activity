<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .success-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #d4edda;
            color: #155724;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            max-width: 400px;
            display: none;
        }
        .success-notification.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="success-notification" id="ticketSuccessNotification">
        <h3>Поздравляем!</h3>
        <p>Ваш билет успешно куплен!</p>
        <p>Информация о билете отправлена на вашу электронную почту.</p>
    </div>
    
    <div class="container">
        <h1>Добро пожаловать на наш сайт!</h1>
        <p>Изучайте мероприятия, покупайте билеты и управляйте своими заказами.</p>
        
        <a href="{% url 'login' %}" class="button">Войти</a>
        <a href="{% url 'register' %}" class="button">Зарегистрироваться</a>
        <a href="{% url 'event_list' %}" class="button">Список мероприятий</a>
    </div>
    
    <script>
        // Проверяем наличие параметра success в URL
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success') && urlParams.get('success') === 'ticket_purchased') {
                const notification = document.getElementById('ticketSuccessNotification');
                notification.classList.add('show');
                
                // Скрываем уведомление через 5 секунд
                setTimeout(function() {
                    notification.classList.remove('show');
                }, 5000);
            }
        });
    </script>
</body>
</html>
