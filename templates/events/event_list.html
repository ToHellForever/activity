
{% extends 'base.html' %}
{% load static %}

{% block content %}
<h1>Список мероприятий</h1>

{% if events %}
    <ul>
        {% for event in events %}
            <li>
                <a href="{% url 'event_detail' event.id %}">
                    {{ event.title }} ({{ event.date_time|date:"d.m.Y H:i" }})
                </a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Нет активных мероприятий.</p>
{% endif %}
{% endblock %}
