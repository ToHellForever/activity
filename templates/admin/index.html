{% extends "admin/index.html" %}
{% load i18n admin_urls static %}

{% block content %}
{{ block.super }}

<!-- Быстрые ссылки -->
<div class="dashboard-quick-links" style="
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
    margin-top: 20px;
    padding: 20px;
    background: #f8f9fa;
    border-radius: 8px;">
    {% for link in quick_links %}
    <a href="{{ link.url }}" style="
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        padding: 20px;
        text-decoration: none;
        color: inherit;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    " onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)'; this.style.transform='translateY(-2px)'; this.style.borderColor='#79aec8'" onmouseout="this.style.boxShadow='none'; this.style.transform='translateY(0)'; this.style.borderColor='#e0e0e0'">
        <div style="font-size: 48px; margin-bottom: 15px;">{{ link.icon }}</div>
        <div style="font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px;">{{ link.name }}</div>
        <div style="font-size: 14px; color: #666; line-height: 1.4;">{{ link.description }}</div>
    </a>
    {% endfor %}
</div>

<style>
.module h2 {
    margin-top: 0;
}
</style>
{% endblock %}
