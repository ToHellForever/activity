{% extends "admin/change_form.html" %}
{% load i18n admin_urls static %}

{% block after_field_sets %}
    <div class="form-group">
        <label>Множественная загрузка фотографий:</label>
        <input type="file" name="images" multiple id="id_images">
        <p class="help">Выберите несколько фотографий для загрузки.</p>
    </div>
    {{ block.super }}
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const tariffSelect = document.getElementById('id_tariff');
    const imagesHelp = document.querySelector('#id_images + .help');

    const limits = {
        1: { max_photos: 1 },
        2: { max_photos: 10 },
        3: { max_photos: 25 }
    };

    function updateImagesHelp() {
        const selectedTariff = tariffSelect.value;
        if (imagesHelp && limits[selectedTariff]) {
            imagesHelp.textContent = `Выберите несколько фотографий для загрузки. Максимум: ${limits[selectedTariff].max_photos}.`;
        }
    }

    if (tariffSelect && imagesHelp) {
        tariffSelect.addEventListener('change', updateImagesHelp);
        updateImagesHelp();
    }
});
</script>
{% endblock %}
