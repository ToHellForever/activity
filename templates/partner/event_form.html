<!-- templates/events/event_form.html -->

<!-- 1. Добавь эти строки в <head> или в начало блока контента -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<!-- ... остальной код формы ... -->

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    {% for field in form %}
        <div class="form-group">
            {{ field.label_tag }}
            {% if field.name == 'date_time' and is_edit and form.instance.date_time %}
                <input type="datetime-local" id="id_date_time" name="date_time" value="{{ form.instance.date_time|date:'Y-m-d\TH:i' }}" class="form-control">
            {% else %}
                {{ field }}
            {% endif %}
            {% if field.help_text %}
                <small class="form-text text-muted">{{ field.help_text }}</small>
            {% endif %}
        </div>
    {% endfor %}

    <button type="submit">Сохранить мероприятие</button>
</form>

<script>
    // Ждем, пока страница полностью загрузится
    document.addEventListener('DOMContentLoaded', function() {
        flatpickr("#id_date_time", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            minDate: "today"
        });
    });
</script>
