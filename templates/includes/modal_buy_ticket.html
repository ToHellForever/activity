{% load format_filters %}
<!-- Модальное окно покупки билетов -->
<div class="modal fade" id="buyTicketModal" tabindex="-1" aria-labelledby="buyTicketModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="buyTicketModalLabel">Выберите билет</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body-modal">
                <!-- Выбор билетов -->
                <div id="ticketSelection">
                    {% for ticket in tickets %}
                    <div class=" mb-3 ticket-card" data-ticket-id="{{ ticket.id }}" data-ticket-name="{{ ticket.name }}" data-ticket-price="{{ ticket.price }}" data-max-qty="{{ ticket.get_available_count|default:0 }}">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-5">
                                    <p class="ticket-name-modal">{{ ticket.name }}</p>
                                    {% if ticket.price == 0 %}
                                        <span class="badge bg-success ms-2">Бесплатно</span>
                                    {% endif %}
                                </div>
                                <div class="col-md-3">
                                    <span class="ticket-price-modal">{{ ticket.price|floatformat }} ₽</span>
                                </div>
                                <div class="col-md-4">
                                    <div class="quantity-input">
                                        <button class="qty-decrease minus" type="button" data-ticket-id="{{ ticket.id }}">−</button>
                                        <input type="number" class="qty-input-field count-tickets" 
                                               value="0" min="0" max="{{ ticket.get_available_count|default:99 }}" 
                                               data-ticket-id="{{ ticket.id }}" id="qty_{{ ticket.id }}">
                                        <button class="qty-increase plus" type="button" data-ticket-id="{{ ticket.id }}">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                </div>

                <!-- Данные покупателя -->
                <div class="email-info mt-4">
                    {% if user.is_authenticated %}
                        <label class="form-label-modal">Ваш билет(ы) будет направлен на</label>
                        <p class="text-muted mb-2">{{ user.email }}</p>
                        <input type="hidden" name="buyer_email" value="{{ user.email }}">
                    {% else %}
                        <label for="buyerEmail" class="form-label">Куда направить билет(ы)?</label>
                        <input type="email" class="email-input" id="buyerEmail" name="buyer_email" required
                               placeholder="example@mail.ru">
                    {% endif %}
                </div>
                            <div class="modal-footer">
                <button type="button" class="buy-button-modal" id="confirmPurchaseBtn" disabled>
                    ОПЛАТИТЬ
                </button>
            </div>
            </div>
        </div>
    </div>
</div>
</div>

<!-- Модальное окно статуса покупки -->
<div class="modal fade" id="purchaseStatusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body text-center p-5">
                <div class="spinner-border text-primary mb-3" id="purchaseSpinner" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <h5 id="purchaseStatusText">Обработка заказа...</h5>
                <p class="text-muted" id="purchaseStatusDetail"></p>
                <div id="purchaseLog" class="text-start mt-3" style="max-height: 200px; overflow-y: auto; display: none;">
                </div>
            </div>
        </div>
</div>
</div>
