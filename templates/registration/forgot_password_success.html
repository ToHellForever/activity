<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .login-box h2 { color: #333; margin-bottom: 1.5rem; }
        button {
            width: 100%;
            padding: 0.7rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Проверьте вашу почту</h2>

    <p>На адрес <strong>{{ email }}</strong> было отправлено письмо с временным паролем.</p>

    <form action="{% url 'login' %}">
        <button type="submit">Вернуться к авторизации</button>
    </form>
</div>

</body>
</html>
